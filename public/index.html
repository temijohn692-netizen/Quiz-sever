<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Quiz</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Inter:wght@400;500;600&display=swap');
* { box-sizing: border-box; }
html, body { margin: 0; height: 100%; }
body { font-family: 'Inter', sans-serif; background: #12161f; color: #e8e6e1; }

.page { min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 24px 18px; }
.card { width: 100%; max-width: 420px; }

h1 { font-family: 'Fraunces', serif; font-size: 24px; margin: 0 0 6px; }
.sub { color: #6b7280; font-size: 13px; margin-bottom: 20px; }

input[type="text"] {
  width: 100%; background: #1c222c; border: 1px solid #2a3040; border-radius: 12px;
  padding: 12px 14px; color: #e8e6e1; font-size: 15px; margin-bottom: 20px;
}

.q-block { background: #171c26; border: 1px solid #232937; border-radius: 14px; padding: 16px; margin-bottom: 14px; }
.q-text { font-size: 15px; margin-bottom: 12px; font-weight: 500; }
.option {
  display: block; background: #1c222c; border: 1px solid #2a3040; border-radius: 10px;
  padding: 10px 14px; margin-bottom: 8px; cursor: pointer; font-size: 14px;
}
.option.selected { background: #ffb454; color: #1a1408; border-color: #ffb454; font-weight: 600; }

button#submitBtn {
  width: 100%; background: #ffb454; color: #1a1408; border: none; border-radius: 12px;
  padding: 14px; font-weight: 700; font-size: 16px; cursor: pointer; margin-top: 8px;
}
button#submitBtn:disabled { opacity: 0.4; }

.result-box {
  text-align: center; padding: 30px 20px; background: #171c26; border: 1px solid #232937; border-radius: 16px;
}
.result-score { font-family: 'Fraunces', serif; font-size: 40px; color: #ffb454; margin: 10px 0; }
.hidden { display: none; }
</style>
</head>
<body>
  <div class="page">
    <div class="card">
      <h1>Quiz</h1>
      <div class="sub" id="progressText">Loading questions...</div>

      <div id="setupScreen">
        <input type="text" id="nameInput" placeholder="Your name">
      </div>

      <div id="questionsContainer"></div>

      <button id="submitBtn" disabled>Submit</button>

      <div id="resultScreen" class="result-box hidden">
        <div>Score</div>
        <div class="result-score" id="resultScoreText"></div>
        <div style="color:#6b7280;font-size:13px;">Your result has been sent.</div>
      </div>
    </div>
  </div>

<script src="app.js"></script>
</body>
</html>
